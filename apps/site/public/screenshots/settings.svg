<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="480" fill="#07070b"/>
  <rect x="0" y="0" width="160" height="480" fill="#0d0d18"/>
  <rect x="160" y="0" width="640" height="48" fill="#0d0d18"/>
  <text x="20" y="36" fill="#00ffc8" font-size="14" font-weight="600" letter-spacing="2">✦ STARLIGHT</text>
  <rect x="14" y="120" width="132" height="32" fill="#1a1a2e" rx="2"/>
  <text x="24" y="140" fill="#00ffc8" font-size="11" font-weight="600">● Settings</text>
  <text x="180" y="84" fill="#e6e6f0" font-size="18" font-weight="600">Settings</text>
  <g transform="translate(180,120)">
    <rect width="460" height="60" fill="#0d0d18" stroke="#1a1a2e" rx="2"/>
    <text x="16" y="24" fill="#e6e6f0" font-size="12" font-weight="600">Process poll interval</text>
    <text x="16" y="42" fill="#7a7a92" font-size="10">How often Starlight scans for running games (500–30000 ms)</text>
    <rect x="380" y="20" width="64" height="22" fill="#0d0d18" stroke="#1a1a2e" rx="2"/>
    <text x="412" y="36" fill="#e6e6f0" font-size="11" font-family="ui-monospace" text-anchor="middle">2000</text>
  </g>
  <g transform="translate(180,200)">
    <rect width="460" height="60" fill="#0d0d18" stroke="#1a1a2e" rx="2"/>
    <text x="16" y="24" fill="#e6e6f0" font-size="12" font-weight="600">Refresh catalog on launch</text>
    <text x="16" y="42" fill="#7a7a92" font-size="10">Pulls latest community trainers when starting up</text>
    <rect x="412" y="22" width="20" height="20" fill="#00ffc8" fill-opacity="0.15" stroke="#00ffc8" rx="2"/>
    <path d="M416 32 L420 36 L428 26" stroke="#00ffc8" stroke-width="2" fill="none"/>
  </g>
</svg>
