name: Publish Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @starlight/ct-importer build
      - run: pnpm --filter @starlight/catalog build
      - run: pnpm --filter @starlight/site build
      - name: Compose deploy directory
        run: |
          mkdir -p _deploy
          cp -r apps/site/dist/. _deploy/
          mkdir -p _deploy/catalog
          cp packages/catalog/index.json _deploy/catalog/
          cp -r packages/catalog/trainers _deploy/catalog/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: _deploy }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
