name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Set up pnpm
        # No `version:` — action-setup@v4 reads it from package.json's
        # `packageManager` field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Lower ptrace scope (so tests can attach)
        run: |
          echo 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build C test target
        run: make -C packages/engine/test-target

      - name: Build TypeScript packages
        run: pnpm -r build

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test
